<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>微進步 · Micro Habits</title>

<meta name="theme-color" content="#0d0f0e">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="微進步">
<link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/7604/7604085.png">
<link rel="manifest" href="data:application/manifest+json;charset=utf-8,%7B%22name%22%3A%22%E5%BE%AE%E9%80%B2%E6%AD%A5%20%C2%B7%20Micro%20Habits%22%2C%22short_name%22%3A%22%E5%BE%AE%E9%80%B2%E6%AD%A5%22%2C%22display%22%3A%22standalone%22%2C%22start_url%22%3A%22.%22%2C%22background_color%22%3A%22%230d0f0e%22%2C%22theme_color%22%3A%22%230d0f0e%22%2C%22icons%22%3A%5B%7B%22src%22%3A%22https%3A%2F%2Fcdn-icons-png.flaticon.com%2F512%2F7604%2F7604085.png%22%2C%22sizes%22%3A%22512x512%22%2C%22type%22%3A%22image%2Fpng%22%7D%5D%7D">

<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@300;400;600&family=DM+Mono:wght@300;400&family=Playfair+Display:ital,wght@1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0f0e;
    --surface: #141714;
    --border: #1e221e;
    --text: #c8d4c8;
    --text-dim: #5a6b5a;
    --accent: #4ade80;
    --accent-dim: #166534;
    --heat-0: #111511;
    --heat-1: #14421e;
    --heat-2: #166534;
    --heat-3: #22c55e;
    --heat-4: #4ade80;
    --gold: #d4a843;
    --radius: 6px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    min-height: 100vh;
    padding: 24px 16px 48px;
    max-width: 680px;
    margin: 0 auto;
    position: relative;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    top: -200px; left: -200px;
    width: 600px; height: 600px;
    background: radial-gradient(circle, rgba(74,222,128,0.04) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  header { position: relative; z-index: 1; margin-bottom: 36px; }
  .brand { display: flex; align-items: baseline; gap: 10px; margin-bottom: 4px; }
  .brand-main { font-family: 'Noto Serif TC', serif; font-size: 26px; font-weight: 300; letter-spacing: 0.05em; color: #e8f0e8; }
  .brand-dot { width: 6px; height: 6px; background: var(--accent); border-radius: 50%; margin-bottom: 4px; box-shadow: 0 0 10px var(--accent); }
  .brand-sub { font-size: 11px; color: var(--text-dim); letter-spacing: 0.2em; text-transform: uppercase; }
  .date-display { font-size: 11px; color: var(--text-dim); letter-spacing: 0.1em; margin-top: 8px; }

  .habit-section { position: relative; z-index: 1; margin-bottom: 28px; }
  .section-label { font-size: 10px; letter-spacing: 0.25em; text-transform: uppercase; color: var(--text-dim); margin-bottom: 12px; }
  .habit-tabs { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 12px; }
  .habit-tab { background: var(--surface); border: 1px solid var(--border); color: var(--text-dim); padding: 6px 14px; border-radius: 20px; font-size: 12px; cursor: pointer; transition: all 0.2s; position: relative; }
  .habit-tab.active { background: var(--accent-dim); border-color: var(--accent); color: var(--accent); }
  .habit-tab .del-btn { display: none; position: absolute; top: -6px; right: -6px; width: 16px; height: 16px; background: #3f1515; border: 1px solid #7f1d1d; border-radius: 50%; color: #f87171; font-size: 9px; align-items: center; justify-content: center; }
  .habit-tab:hover .del-btn { display: flex; }

  .add-habit-row { display: flex; gap: 8px; }
  .add-habit-input { flex: 1; background: var(--surface); border: 1px solid var(--border); color: var(--text); padding: 8px 14px; border-radius: var(--radius); font-size: 12px; outline: none; }
  .add-habit-input:focus { border-color: var(--accent-dim); }
  .btn { background: var(--accent-dim); border: 1px solid var(--accent); color: var(--accent); padding: 8px 16px; border-radius: var(--radius); cursor: pointer; font-size: 12px; transition: all 0.2s; }
  .btn:hover { background: var(--accent); color: var(--bg); }

  .checkin-section { position: relative; z-index: 1; background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 20px; margin-bottom: 28px; }
  .checkin-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
  .streak-badge { background: rgba(212,168,67,0.1); border: 1px solid rgba(212,168,67,0.3); padding: 4px 10px; border-radius: 20px; font-size: 11px; color: var(--gold); }
  
  .note-input { width: 100%; background: var(--bg); border: 1px solid var(--border); color: var(--text); padding: 12px 16px; border-radius: var(--radius); font-size: 13px; outline: none; resize: none; margin-bottom: 12px; min-height: 80px; transition: border-color 0.2s; }
  .note-input:focus { border-color: var(--accent-dim); }
  .intensity-dots { display: flex; gap: 5px; }
  .dot { width: 18px; height: 18px; border-radius: 4px; cursor: pointer; border: 2px solid transparent; transition: all 0.2s; }
  .dot[data-v="1"] { background: var(--heat-1); }
  .dot[data-v="2"] { background: var(--heat-2); }
  .dot[data-v="3"] { background: var(--heat-3); }
  .dot[data-v="4"] { background: var(--heat-4); }
  .dot.selected { border-color: white; transform: scale(1.15); }

  .btn-log { background: var(--accent); color: #0d0f0e; padding: 10px 24px; border: none; border-radius: var(--radius); cursor: pointer; font-weight: bold; transition: all 0.2s;}
  .btn-log:hover { opacity: 0.9; }

  /* Heatmap 排版調整 */
  .heatmap-cell { width: 13px; height: 13px; border-radius: 2px; transition: transform 0.1s; }
  .heatmap-cell[data-v="0"] { background: var(--heat-0); }
  .heatmap-cell[data-v="1"] { background: var(--heat-1); }
  .heatmap-cell[data-v="2"] { background: var(--heat-2); }
  .heatmap-cell[data-v="3"] { background: var(--heat-3); }
  .heatmap-cell[data-v="4"] { background: var(--heat-4); }
  .heatmap-cell.future-cell { opacity: 0.15; cursor: default; }
  .heatmap-cell:not(.future-cell):hover { transform: scale(1.3); z-index: 10; position: relative; }
  .today-cell { outline: 1.5px solid var(--accent); outline-offset: 1px; }

  .legend { display: flex; align-items: center; gap: 5px; justify-content: flex-end; margin-top: 10px; font-size: 9px; color: var(--text-dim); }
  .legend-cell { width: 11px; height: 11px; border-radius: 2px; }

  .history-item { display: flex; gap: 12px; padding: 10px 14px; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); margin-bottom: 8px; }
  .history-dot { width: 10px; height: 10px; border-radius: 2px; margin-top: 3px; flex-shrink: 0;}

  .tooltip { position: fixed; background: #1a1e1a; border: 1px solid var(--border); padding: 8px 12px; border-radius: 8px; font-size: 11px; color: var(--text); opacity: 0; pointer-events: none; z-index: 100; transition: opacity 0.15s; }
  .tooltip.visible { opacity: 1; }
  .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(60px); background: var(--accent); color: #0d0f0e; padding: 10px 24px; border-radius: 24px; opacity: 0; transition: all 0.3s cubic-bezier(0.34,1.56,0.64,1); z-index: 999; font-weight: bold; pointer-events: none; }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  ::-webkit-scrollbar { height: 4px; width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
</style>
</head>
<body>

<header>
  <div class="brand">
    <span class="brand-main">微進步</span>
    <div class="brand-dot"></div>
  </div>
  <div class="brand-sub">Micro Habit Tracker</div>
  <div class="date-display" id="dateDisplay"></div>
</header>

<div class="habit-section">
  <div class="section-label">習慣項目</div>
  <div class="habit-tabs" id="habitTabs"></div>
  <div class="add-habit-row">
    <input class="add-habit-input" id="newHabitInput" placeholder="新增習慣（如：背一個單字）" maxlength="20">
    <button class="btn" onclick="addHabit()">+ 新增</button>
  </div>
</div>

<div class="checkin-section">
  <div class="checkin-header">
    <span class="checkin-today" id="checkinLabel">今日打卡</span>
    <div class="streak-badge" id="streakBadge">🔥 <span id="streakCount">0</span> 天連續</div>
  </div>
  <div id="checkinForm">
    <textarea class="note-input" id="noteInput" placeholder="記錄今天的小事…"></textarea>
    <div style="display:flex; justify-content: space-between; align-items:center;">
        <div class="intensity-dots" id="intensityDots">
          <div class="dot selected" data-v="1" onclick="selectIntensity(1)"></div>
          <div class="dot" data-v="2" onclick="selectIntensity(2)"></div>
          <div class="dot" data-v="3" onclick="selectIntensity(3)"></div>
          <div class="dot" data-v="4" onclick="selectIntensity(4)"></div>
        </div>
      <button class="btn-log" id="logBtn" onclick="logToday()">✓ 記錄</button>
    </div>
  </div>
  <div id="alreadyDone" style="display:none; text-align:center; color:var(--accent); font-size: 13px;">
    ✅ 今天已完成！繼續保持 <button onclick="undoToday()" style="background:none; border:none; color:var(--text-dim); text-decoration:underline; cursor:pointer; margin-left: 8px;">撤銷</button>
  </div>
</div>

<div class="heatmap-section" style="position:relative; z-index:1; margin-bottom:28px;">
  <div class="section-label" style="display:flex; justify-content:space-between">
    <span>貢獻熱力圖 · 過去一年</span>
    <span style="color:var(--text-dim); text-transform:none">累積 <span id="totalDays" style="color:var(--accent)">0</span> 天</span>
  </div>
  
  <div style="display:flex; gap:6px;">
    <div style="display:flex; flex-direction:column; gap:3px; font-size:9px; color:var(--text-dim); flex-shrink: 0;">
        <div style="height:12px; margin-bottom:4px;"></div>
        <div style="height:13px"></div>
        <div style="height:13px; display:flex; align-items:center">一</div>
        <div style="height:13px"></div>
        <div style="height:13px; display:flex; align-items:center">三</div>
        <div style="height:13px"></div>
        <div style="height:13px; display:flex; align-items:center">五</div>
        <div style="height:13px"></div>
    </div>
    
    <div id="heatmapScrollContainer" style="flex: 1; overflow-x: auto; scroll-behavior: smooth; padding-bottom: 8px;">
      <div style="min-width: max-content;">
        <div id="monthLabels" style="font-size:9px; color:var(--text-dim); margin-bottom:4px; height:12px; position:relative;"></div>
        <div id="heatmapGrid" style="display:flex; gap:3px;"></div>
      </div>
    </div>
  </div>
  
  <div class="legend">
    <span>少</span>
    <div class="legend-cell" style="background:var(--heat-0)"></div>
    <div class="legend-cell" style="background:var(--heat-1)"></div>
    <div class="legend-cell" style="background:var(--heat-2)"></div>
    <div class="legend-cell" style="background:var(--heat-3)"></div>
    <div class="legend-cell" style="background:var(--heat-4)"></div>
    <span>多</span>
  </div>
</div>

<div class="history-section" style="position:relative; z-index:1;">
  <div class="section-label" style="display:flex; justify-content:space-between; align-items:center;">
    <span>最近記錄</span>
    <button onclick="downloadCSV()" style="background:none; border:1px solid var(--border); color:var(--text-dim); padding:4px 8px; border-radius:4px; font-size:10px; cursor:pointer; font-family:inherit; transition:all 0.2s;">📥 匯出CSV</button>
  </div>
  <div class="history-list" id="historyList"></div>
</div>

<div class="tooltip" id="tooltip">
  <div id="tipDate" style="color:var(--text-dim); font-size: 10px; margin-bottom: 2px;"></div>
  <div id="tipValue" style="margin-bottom: 2px;"></div>
  <div id="tipNote" style="color:var(--accent)"></div>
</div>
<div class="toast" id="toast"></div>

<script>
// --- PWA Service Worker 註冊 (動態建立，不需額外檔案) ---
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    const swCode = `
      self.addEventListener('install', (e) => self.skipWaiting());
      self.addEventListener('activate', (e) => self.clients.claim());
      self.addEventListener('fetch', (e) => {}); // 空快取攔截器，滿足PWA條件
    `;
    const blob = new Blob([swCode], { type: 'application/javascript' });
    navigator.serviceWorker.register(URL.createObjectURL(blob))
      .catch(err => console.log('PWA ServiceWorker 註冊失敗:', err));
  });
}

// --- 主要應用邏輯 ---
const STORAGE_KEY = 'micro_habits_v2';
let selectedIntensity = 1;
let currentHabit = null;

function loadData() {
  return JSON.parse(localStorage.getItem(STORAGE_KEY)) || { habits: [], records: {} };
}
function saveData(data) { localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); }

function todayStr() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function formatDate(str) {
  const d = new Date(str);
  return `${d.getFullYear()}年${d.getMonth()+1}月${d.getDate()}日 (週${['日','一','二','三','四','五','六'][d.getDay()]})`;
}

function addHabit() {
  const input = document.getElementById('newHabitInput');
  const name = input.value.trim();
  if (!name) return;
  const data = loadData();
  const id = 'h' + Date.now();
  data.habits.push({ id, name });
  saveData(data);
  input.value = '';
  renderHabits();
  selectHabit(id);
}

function deleteHabit(id) {
  if(!confirm("確定要刪除這個習慣及其所有紀錄嗎？")) return;
  const data = loadData();
  data.habits = data.habits.filter(h => h.id !== id);
  delete data.records[id];
  saveData(data);
  currentHabit = data.habits[0]?.id || null;
  renderHabits();
  renderAll();
}

function selectHabit(id) {
  currentHabit = id;
  renderHabits();
  renderAll();
}

function renderHabits() {
  const data = loadData();
  const tabs = document.getElementById('habitTabs');
  tabs.innerHTML = data.habits.map(h => `
    <div class="habit-tab ${h.id === currentHabit ? 'active' : ''}" onclick="selectHabit('${h.id}')">
      ${h.name}
      <div class="del-btn" onclick="event.stopPropagation();deleteHabit('${h.id}')">×</div>
    </div>
  `).join('');
}

function logToday() {
  if (!currentHabit) return;
  const note = document.getElementById('noteInput').value;
  const data = loadData();
  if (!data.records[currentHabit]) data.records[currentHabit] = {};
  data.records[currentHabit][todayStr()] = { v: selectedIntensity, note };
  saveData(data);
  document.getElementById('noteInput').value = '';
  renderAll();
  showToast('✓ 今日已記錄！');
}

function undoToday() {
  const data = loadData();
  if (data.records[currentHabit]) {
    delete data.records[currentHabit][todayStr()];
    saveData(data);
    renderAll();
  }
}

function renderAll() {
  const data = loadData();
  const records = currentHabit ? (data.records[currentHabit] || {}) : {};
  const todayVal = todayStr();

  document.getElementById('dateDisplay').textContent = formatDate(todayVal);
  const doneToday = !!records[todayVal];
  document.getElementById('checkinForm').style.display = doneToday ? 'none' : 'block';
  document.getElementById('alreadyDone').style.display = doneToday ? 'block' : 'none';
  
  let streak = 0;
  let d = new Date();
  while(records[`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`]) { 
    streak++; 
    d.setDate(d.getDate()-1); 
  }
  document.getElementById('streakCount').textContent = streak;
  document.getElementById('totalDays').textContent = Object.keys(records).length;

  renderHeatmap(records);
  renderHistory(records);
}

function renderHeatmap(records) {
  const grid = document.getElementById('heatmapGrid');
  const monthLabels = document.getElementById('monthLabels');
  grid.innerHTML = ''; monthLabels.innerHTML = '';
  
  const todayStrVal = todayStr();
  const todayDate = new Date();
  
  const endDate = new Date(todayDate);
  endDate.setDate(endDate.getDate() + (6 - endDate.getDay()));
  const startDate = new Date(endDate);
  startDate.setDate(startDate.getDate() - 52 * 7 - 6);

  let cur = new Date(startDate);
  const months = [];

  for (let i = 0; i < 53; i++) {
    const col = document.createElement('div');
    col.style.display = 'flex';
    col.style.flexDirection = 'column';
    col.style.gap = '3px';
    
    for (let j = 0; j < 7; j++) {
      const ds = `${cur.getFullYear()}-${String(cur.getMonth()+1).padStart(2,'0')}-${String(cur.getDate()).padStart(2,'0')}`;
      const isFuture = ds > todayStrVal;
      
      const cell = document.createElement('div');
      cell.className = 'heatmap-cell' + (ds === todayStrVal ? ' today-cell' : '') + (isFuture ? ' future-cell' : '');
      const val = records[ds]?.v || 0;
      cell.setAttribute('data-v', isFuture ? 0 : val);
      
      if (!isFuture) {
        // 加入 touch 事件支援手機點按
        cell.onmouseenter = (e) => showTooltip(e, ds, records[ds]);
        cell.onmouseleave = hideTooltip;
        cell.ontouchstart = (e) => { e.preventDefault(); showTooltip(e.touches[0], ds, records[ds]); };
      }
      col.appendChild(cell);
      
      if (cur.getDate() <= 7 && j === 0) {
        months.push({ colIdx: i, month: cur.getMonth() });
      }
      cur.setDate(cur.getDate() + 1);
    }
    grid.appendChild(col);
  }

  const MONTH_NAMES = ['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];
  months.forEach(({ colIdx, month }) => {
    const lbl = document.createElement('span');
    lbl.style.position = 'absolute';
    lbl.style.left = (colIdx * 16) + 'px';
    lbl.textContent = MONTH_NAMES[month];
    monthLabels.appendChild(lbl);
  });

  setTimeout(() => {
    const container = document.getElementById('heatmapScrollContainer');
    if(container) container.scrollLeft = container.scrollWidth;
  }, 10);
}

function renderHistory(records) {
  const list = document.getElementById('historyList');
  const entries = Object.entries(records).sort((a,b) => b[0].localeCompare(a[0])).slice(0,15);
  if(entries.length === 0) {
      list.innerHTML = '<div style="text-align:center; padding: 24px; color: var(--text-dim); font-size: 12px; border: 1px dashed var(--border); border-radius: 8px;">還沒有記錄，開始第一步吧 🌱</div>';
      return;
  }
  const colors = ['','var(--heat-1)','var(--heat-2)','var(--heat-3)','var(--heat-4)'];
  const labels = ['','輕度','中度','高度','全力'];
  list.innerHTML = entries.map(([date, rec]) => `
    <div class="history-item">
      <div class="history-dot" style="background:${colors[rec.v]}"></div>
      <div>
        <div style="font-size:10px; color:var(--text-dim); margin-bottom: 2px;">${formatDate(date)} · ${labels[rec.v]}</div>
        <div style="font-size:13px; line-height: 1.4;">${rec.note || '打卡完成'}</div>
      </div>
    </div>
  `).join('');
}

function showTooltip(e, date, rec) {
  const tip = document.getElementById('tooltip');
  document.getElementById('tipDate').textContent = date;
  const labels = ['','🟩 輕度','🟩 中度','🟩 高度','🟩 全力'];
  document.getElementById('tipValue').textContent = rec ? labels[rec.v] : '未記錄';
  document.getElementById('tipNote').textContent = rec?.note || '';
  
  const x = e.clientX + 10;
  const maxW = window.innerWidth - 180;
  tip.style.left = Math.min(x, maxW) + 'px';
  tip.style.top = e.clientY - 60 + 'px';
  tip.classList.add('visible');
  
  // 點擊其他地方關閉 tooltip (手機優化)
  document.addEventListener('touchstart', function closeTip(evt) {
    if(!evt.target.classList.contains('heatmap-cell')) {
      hideTooltip();
      document.removeEventListener('touchstart', closeTip);
    }
  });
}
function hideTooltip() { document.getElementById('tooltip').classList.remove('visible'); }

function selectIntensity(v) {
  selectedIntensity = v;
  document.querySelectorAll('.dot').forEach(d => d.classList.toggle('selected', parseInt(d.dataset.v) === v));
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

function downloadCSV() {
  const data = loadData();
  let csvContent = "習慣名稱,日期,強度,筆記\n";
  let hasData = false;

  data.habits.forEach(habit => {
    const records = data.records[habit.id] || {};
    Object.entries(records).sort((a,b) => a[0].localeCompare(b[0])).forEach(([date, rec]) => {
      hasData = true;
      let safeNote = (rec.note || '').replace(/"/g, '""'); 
      if (safeNote.includes(',') || safeNote.includes('\n') || safeNote.includes('"')) {
        safeNote = `"${safeNote}"`; 
      }
      csvContent += `"${habit.name}",${date},${rec.v},${safeNote}\n`;
    });
  });

  if (!hasData) { showToast('尚無任何紀錄可匯出'); return; }

  const blob = new Blob(["\uFEFF" + csvContent], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const link = document.createElement("a");
  link.setAttribute("href", url);
  link.setAttribute("download", `micro-habits-data-${todayStr()}.csv`);
  link.style.visibility = 'hidden';
  document.body.appendChild(link);
  link.click();
  document.body.removeChild(link);
  showToast('✓ 數據已成功匯出');
}

document.getElementById('newHabitInput').addEventListener('keypress', function (e) {
    if (e.key === 'Enter') addHabit();
});

(function init() {
  const data = loadData();
  if (data.habits.length === 0) {
    data.habits = [{ id: 'h1', name: '背單字' }, { id: 'h2', name: '運動' }];
    saveData(data);
  }
  currentHabit = data.habits[0].id;
  renderHabits();
  renderAll();
})();
</script>
